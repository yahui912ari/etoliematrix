    <script vid="143">
        const STORAGE_KEY = 'ume_matrix_v11_local_demo';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All', activeEditKey = null;
        let defaultDb = { baseBudget: 0, targetSaving: 0, octopusBal: 0, records: [], dueDates: [], checklist: [], wishlist: [] };
        let db = { ...defaultDb };

        // Export/Import
        function exportData() { const dataStr = JSON.stringify(db, null, 2); const blob = new Blob([dataStr], { type: 'application/json' }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = `ume_matrix_backup_${new Date().toISOString().slice(0,10)}.json`; link.click(); URL.revokeObjectURL(url); }
        function importData(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const imported = JSON.parse(e.target.result); if (confirm("Import current data?")) { db = { ...defaultDb, ...imported }; saveLocally(); location.reload(); } } catch (err) { alert("Invalid file."); } }; reader.readAsText(file); }

        function initApp() { const localData = localStorage.getItem(STORAGE_KEY); if (localData) try { db = JSON.parse(localData); } catch (e) {} refresh(); updateFX(); }
        function saveLocally() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); refresh(); const status = document.getElementById('sync-status'); status.style.opacity = '1'; setTimeout(() => { status.style.opacity = '0'; }, 2000); }
        function toggleModal(id, show) { const modal = document.getElementById(id); if (show) modal.classList.add('active'); else modal.classList.remove('active'); }
        
        function getCycleDays() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            return today === lastDay ? new Date(now.getFullYear(), now.getMonth() + 2, 0).getDate() : (lastDay - today) + 1;
        }

        function calculateStats() {
            let pool = db.baseBudget, octo = db.octopusBal;
            let dailyCategorySpentToday = 0; // 当天消费型支出
            const nowStr = `${new Date().getMonth()+1}.${new Date().getDate()}`;
            const consumptionCats = ['Meal', 'Transport', 'Shopping'];

            db.records.forEach(r => {
                if(r.category === 'Exclude') return;
                
                if (consumptionCats.includes(r.category)) {
                    // 消费型：直接减总池子，但在逻辑上它是“日推荐”要消化的部分
                    if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD;
                    if(r.fullDate === nowStr) dailyCategorySpentToday += r.valHKD;
                } else {
                    // 固定型/收入型：增减总池子，这会直接改变剩余每天的平均值
                    if(r.category === 'Income') pool += r.valHKD;
                    else if(r.category === 'TopUp') { pool -= r.valHKD; octo += r.valHKD; }
                    else {
                        if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD;
                    }
                }
            });

            const daysLeft = getCycleDays();
            // 公式：(总-想存的钱)/天数*0.8
            const rawDailyRec = Math.max(0, ((pool - db.targetSaving) / daysLeft) * 0.8);
            
            // 界面上显示的“今日还剩多少” = 日推荐额度 - 今日消费型支出
            const dailyLeftToSpend = Math.max(0, rawDailyRec - dailyCategorySpentToday);

            return { pool, octo, dailyLeftToSpend, daysLeft, rawDailyRec };
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('stat-octo').innerText = s.octo.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('stat-save').innerText = (db.targetSaving || 0).toLocaleString();
            document.getElementById('stat-daily').innerText = Math.floor(s.dailyLeftToSpend); // 显示今日余额
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            // Wishlist: 这里的盈余逻辑也基于你每天剩下的钱
            let surplus = 0; const now = new Date(); const todayIdx = now.getDate();
            const consumptionCats = ['Meal', 'Transport', 'Shopping'];
            for(let d = 1; d <= todayIdx; d++) {
                const dateKey = `${now.getMonth()+1}.${d}`;
                const dailySpent = db.records.reduce((sum, r) => (r.fullDate === dateKey && consumptionCats.includes(r.category)) ? sum + r.valHKD : sum, 0);
                surplus += (s.rawDailyRec - dailySpent);
            }
            surplus = Math.max(0, surplus);
            db.wishlist.forEach(w => { const fill = Math.min(w.target, surplus); w.saved = fill; surplus -= fill; });

            // Ticker & List & Others (同前)
            let tickerParts = [];
            db.checklist.filter(c => !c.done).forEach(c => tickerParts.push(`TASK: ${c.name}`));
            db.dueDates.forEach(d => tickerParts.push(`DUE: ${d.name} ($${d.amount})`));
            document.getElementById('main-ticker').innerHTML = (tickerParts.length > 0 ? tickerParts.map(p => `<span class="mx-8">${p}</span>`).join('') : `<span class="mx-8 opacity-40">ALL CLEAR</span>`).repeat(6); 

            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Transfer', 'Income', 'Exclude'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `<button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border border-white text-[9px] font-bold uppercase transition-all snap-start whitespace-nowrap ${currentFilter === c ? 'bg-[#1a2744] text-white' : 'bg-white/40 text-[#1a2744]'}">${c}</button>`).join('');
            
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            let netTotal = 0;
            document.getElementById('log-list').innerHTML = filtered.slice(0, 15).map(r => {
                if(r.category !== 'Exclude') netTotal += (r.category === 'Income' || (r.category === 'TopUp' && !r.viaOcto)) ? r.valHKD : -r.valHKD;
                return `<div class="flex justify-between items-center p-4 border-b border-white/40 last:border-0 ${r.category === 'Exclude' ? 'opacity-40 italic' : ''}">
                    <div class="flex flex-col gap-0.5"><span class="text-xs font-bold text-[#1a2744]">${r.name}</span><div class="text-[9px] text-[#1a2744]/50 uppercase font-medium">${r.fullDate} ${r.viaOcto?'• OCT':''} • ${r.category}</div></div>
                    <div class="font-mono-custom font-bold text-sm ${r.category === 'Income' ? 'text-[#00b8a9]' : 'text-[#1a2744]'}">${r.category === 'Income' ? '+' : '-'}${r.valHKD.toFixed(1)}</div>
                </div>`;
            }).join('') || `<div class="p-6 text-center text-xs text-[#1a2744]/40 font-bold uppercase">No records</div>`;
            document.getElementById('audit-summary').innerText = `NET: ${netTotal > 0 ? '+' : ''}${netTotal.toFixed(0)}`;

            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => {
                const perc = Math.min(100, (w.saved / w.target) * 100);
                return `<div class="glass-card rounded-[24px] p-4 relative overflow-hidden bg-white/50 group">
                    <div class="flex justify-between mb-2.5 text-[10px] font-bold uppercase tracking-wide z-10 relative"><span class="text-[#1a2744] flex items-center gap-1.5">✦ ${w.name}</span><span class="font-mono-custom text-[#00b8a9]">${perc.toFixed(1)}%</span></div>
                    <div class="w-full h-2 bg-[#1a2744]/5 rounded-full overflow-hidden z-10 relative"><div class="h-full bg-gradient-to-r from-[#00b8a9] to-[#00d6c4] rounded-full transition-all duration-1000" style="width:${perc}%"></div></div>
                    <button onclick="removeWish(${i})" class="absolute top-2 right-3 text-[16px] text-[#1a2744]/10 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all z-20 leading-none">×</button>
                </div>`;
            }).join('');

            document.getElementById('due-list').innerHTML = db.dueDates.map(d => `<div class="glass-card rounded-[20px] p-4 flex justify-between items-center bg-white/60">
                <div class="flex flex-col gap-1"><span class="text-xs font-bold text-[#1a2744]">${d.name} <span class="text-[10px] text-[#1a2744]/50 font-normal">(${d.type})</span></span><div class="flex gap-2 text-[10px] text-[#1a2744]/60 font-mono-custom"><span class="bg-white/80 px-1.5 rounded-md text-[#1a2744] font-bold">$${d.amount}</span><span>Due: ${d.date}</span></div></div>
                <button onclick="executeDue(${d.id})" class="bg-[#1a2744] text-white text-[9px] font-bold px-4 py-2.5 rounded-xl uppercase btn-active shadow-sm">Pay</button>
            </div>`).join('') || `<div class="text-center text-[10px] text-[#1a2744]/40 py-2 uppercase font-bold">No due items</div>`;

            document.getElementById('checklist-container').innerHTML = db.checklist.map((c, i) => `<div class="glass-card rounded-[20px] p-3.5 flex justify-between items-center ${c.done ? 'opacity-40' : 'bg-white/60'} group">
                <span class="text-xs font-semibold ${c.done ? 'line-through' : ''}">${c.name}</span><div class="flex items-center gap-3"><input type="checkbox" ${c.done ? 'checked' : ''} onchange="toggleCheck(${i})" class="w-5 h-5 border-2 border-[#1a2744]/20 rounded-md checked:bg-[#00b8a9] appearance-none"><button onclick="removeCheck(${i})" class="text-[16px] text-[#1a2744]/20 hover:text-red-400">×</button></div>
            </div>`).join('') || `<div class="text-center text-[10px] text-[#1a2744]/40 py-2 uppercase font-bold">Checklist empty</div>`;
        }

        function commitTransaction() {
            const val = parseFloat(document.getElementById('in-val').value); if(isNaN(val) || val <= 0) return;
            const cur = document.getElementById('in-cur').value, cat = document.getElementById('in-cat').value, name = document.getElementById('in-name').value;
            db.records.unshift({ name: name || cat, valHKD: val * (FX[cur] || 1), category: cat, viaOcto: document.getElementById('via-octo').checked, fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` });
            document.getElementById('in-val').value = ''; document.getElementById('in-name').value = ''; saveLocally();
        }
        function addDue() {
            const n = document.getElementById('due-name').value.trim(), a = document.getElementById('due-amt').value; if(!n || !a) return;
            db.dueDates.push({ id: Date.now(), type: document.getElementById('due-type').value, name: n, amount: parseFloat(a), date: document.getElementById('due-date').value || 'TBD' });
            document.getElementById('due-name').value = ''; document.getElementById('due-amt').value = ''; saveLocally();
        }
        function executeDue(id) {
            const idx = db.dueDates.findIndex(d => d.id === id); if(idx > -1) {
                const item = db.dueDates[idx]; if(confirm(`Pay for ${item.name}?`)) {
                    db.records.unshift({ name: `✦ [${item.type}] ${item.name}`, valHKD: item.amount, category: 'Takarazuka', viaOcto: false, fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` });
                    db.dueDates.splice(idx, 1); saveLocally();
                }
            }
        }
        function generateTour() {
            const name = document.getElementById('tour-name').value.trim(), count = parseInt(document.getElementById('tour-count').value) || 1; if(!name) return;
            db.checklist.push({ name: `✦ ${name} | Ticket`, done: false }); if(document.getElementById('tour-has-event').checked) db.checklist.push({ name: `✦ ${name} | Event`, done: false });
            for(let i = 1; i <= count; i++) { db.checklist.push({ name: `✦ ${name} | Flight${count>1?' #'+i:''}`, done: false }); db.checklist.push({ name: `✦ ${name} | Hotel${count>1?' #'+i:''}`, done: false }); }
            toggleModal('checklist-modal', false); saveLocally();
        }
        function addWishFinal() {
            const n = document.getElementById('final-wish-name').value.trim(), t = parseFloat(document.getElementById('final-wish-target').value);
            if(n && t > 0) { db.wishlist.push({ name: n, target: t, saved: 0 }); toggleModal('wish-modal', false); saveLocally(); }
        }
        function openEditModal(key, title) { activeEditKey = key; document.getElementById('modal-title').innerText = `Update ${title}`; document.getElementById('modal-input').value = db[key]; toggleModal('edit-modal', true); }
        function saveEditModal() { const val = parseFloat(document.getElementById('modal-input').value); if(!isNaN(val)) db[activeEditKey] = val; toggleModal('edit-modal', false); saveLocally(); }
        window.toggleCheck = (i) => { db.checklist[i].done = !db.checklist[i].done; saveLocally(); };
        window.removeCheck = (i) => { if(confirm('Delete?')) { db.checklist.splice(i, 1); saveLocally(); } };
        window.removeWish = (i) => { if(confirm('Remove?')) { db.wishlist.splice(i, 1); saveLocally(); } };
        window.setFilter = (f) => { currentFilter = f; refresh(); };
        async function updateFX() { 
            const btn = document.getElementById('fx-display'); btn.classList.add('animate-pulse');
            try { 
                const res = await fetch('https://open.er-api.com/v6/latest/HKD'); const data = await res.json(); 
                if(data.rates) { FX.JPY = 1/data.rates.JPY; FX.CNY = 1/data.rates.CNY; btn.innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`; refresh(); } 
            } catch(e) { btn.innerText = "FX Offline"; } btn.classList.remove('animate-pulse');
        }
        window.onload = initApp;
    </script>
</body></html>
