<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Etolie Matrix</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --color-text: #1a2744; --color-green: #00b8a9; --color-lavender: #ccccff; --color-bg: #ffffff; }
        body { -webkit-tap-highlight-color: transparent; background-color: var(--color-bg); font-family: 'Inter', sans-serif; color: var(--color-text); overflow-x: hidden; width: 100%; min-height: 100vh; }
        .font-matrix-title { font-family: 'Playfair Display', serif; font-weight: 600; font-style: italic; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 8px 32px rgba(26, 39, 68, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.2s ease; color: var(--color-text); width: 100%; outline: none; }
        .btn-active:active { transform: scale(0.96); }
        .btn-active { transition: transform 0.1s ease, background-color 0.2s ease; }
        .ticker-mask { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-ticker { animation: ticker 60s linear infinite; }
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-backdrop { position: absolute; inset: 0; background: rgba(26, 39, 68, 0.2); backdrop-filter: blur(4px); }
        .modal-content { transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
    </style>
</head>
<body class="w-full flex flex-col relative pb-40">

    <header class="pt-12 pb-4 px-6 relative z-10">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-4xl font-matrix-title text-[#1a2744] leading-none mb-1">Matrix<span class="text-[#00b8a9]">.</span></h1>
                <div class="flex gap-2 mt-2">
                    <button onclick="exportData()" class="text-[8px] font-bold text-[#1a2744]/40 uppercase tracking-widest hover:text-[#00b8a9]">Export</button>
                    <button onclick="document.getElementById('import-input').click()" class="text-[8px] font-bold text-[#1a2744]/40 uppercase tracking-widest hover:text-[#00b8a9]">Import</button>
                    <input type="file" id="import-input" class="hidden" accept=".json" onchange="importData(event)">
                </div>
            </div>
            <div class="flex flex-col items-end gap-1">
                <button id="fx-display" class="px-3 py-1.5 rounded-full bg-white/40 backdrop-blur-md text-[10px] font-mono-custom font-semibold text-[#1a2744] shadow-sm" onclick="updateFX()">Syncing FX...</button>
                <span id="sync-status" class="text-[8px] font-bold text-[#00b8a9] uppercase tracking-widest opacity-0">Cloud Synced</span>
            </div>
        </div>

        <div class="glass-card rounded-[32px] p-6 mb-5 relative overflow-hidden">
            <div class="flex gap-4 mb-6 relative z-10">
                <div class="flex-1 flex flex-col border-r border-[#1a2744]/10 pr-2" onclick="openEditModal('baseBudget', 'Total Assets')">
                    <span class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Total (HKD)</span>
                    <div class="text-2xl font-mono-custom font-bold text-[#1a2744]" id="stat-assets">0.00</div>
                </div>
                <div class="flex-1 flex flex-col pl-2" onclick="openEditModal('octopusBal', 'Octopus Initial')">
                    <span class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Octopus</span>
                    <div class="text-2xl font-mono-custom font-bold text-[#ccccff]" id="stat-octo">0.00</div>
                </div>
            </div>
            <div class="flex items-center justify-between border-t border-white/60 pt-4 text-center gap-2">
                <div class="flex-1" onclick="openEditModal('targetSaving', 'Target Saving')">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Target</div>
                    <div class="text-base font-mono-custom font-bold text-[#00b8a9]" id="stat-save">0</div>
                </div>
                <div class="w-px h-6 bg-[#1a2744]/10 rounded-full"></div>
                <div class="flex-1">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Daily Rec</div>
                    <div class="text-base font-mono-custom font-bold text-[#ccccff]" id="stat-daily">0</div>
                </div>
                <div class="w-px h-6 bg-[#1a2744]/10 rounded-full"></div>
                <div class="flex-1">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Cycle Left</div>
                    <div class="text-base font-mono-custom font-bold text-[#1a2744]" id="stat-days">0D</div>
                </div>
            </div>
        </div>

        <div class="w-full h-10 rounded-full shadow-sm bg-white/60 backdrop-blur-xl border border-white flex items-center overflow-hidden">
            <div id="main-ticker" class="flex whitespace-nowrap animate-ticker text-[10px] font-mono-custom font-bold text-[#1a2744]/80 uppercase tracking-wide"></div>
        </div>
    </header>

    <main class="px-6 pt-2 space-y-10">
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase"><span class="text-[#00b8a9] text-sm">✦</span> Audit Stream</h2>
                <div id="audit-summary" class="px-3 py-1 bg-white/60 rounded-full font-mono-custom font-bold text-[9px] text-[#1a2744] border border-white shadow-sm">NET: 0</div>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-2 snap-x" id="audit-filters"></div>
            <div class="glass-card rounded-[24px] overflow-hidden flex flex-col min-h-[100px]" id="log-list"></div>
        </section>

        <section>
            <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase mb-4"><span class="text-[#ccccff] text-sm">✦</span> Wishlist</h2>
            <div id="wish-container" class="space-y-3"></div>
            <button onclick="toggleModal('wish-modal', true)" class="w-full mt-4 py-3.5 rounded-2xl border border-dashed border-[#1a2744]/30 text-[10px] font-bold text-[#1a2744]/60 uppercase tracking-widest btn-active">+ New Wish</button>
        </section>

        <section>
            <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase mb-4"><span class="text-[#00b8a9] text-sm">✦</span> Due Planning</h2>
            <div class="glass-card rounded-[24px] p-5 mb-4 space-y-3">
                <div class="flex gap-2">
                    <select id="due-type" class="glass-input h-11 rounded-xl pl-3 pr-8 text-xs font-bold uppercase appearance-none"><option>Ticket</option><option>Hotel</option><option>Flight</option><option>Event</option><option>Goods</option></select>
                    <input type="text" id="due-name" placeholder="Name" class="glass-input flex-1 rounded-xl px-4 text-sm h-11 font-medium">
                </div>
                <div class="flex gap-2">
                    <input type="text" id="due-date" placeholder="MM.DD" class="glass-input w-24 rounded-xl text-center text-sm font-mono-custom h-11">
                    <input type="number" id="due-amt" placeholder="Amount" class="glass-input flex-1 rounded-xl px-4 h-11 text-sm font-mono-custom">
                    <button onclick="addDue()" class="bg-[#1a2744] text-white rounded-xl px-6 h-11 text-[10px] font-bold uppercase btn-active shadow-md">Plan</button>
                </div>
            </div>
            <div id="due-list" class="space-y-2.5"></div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase"><span class="text-[#ccccff] text-sm">✦</span> Expedition Checklist</h2>
                <button onclick="toggleModal('checklist-modal', true)" class="text-[9px] bg-white/80 text-[#1a2744] border border-white px-3 py-1.5 rounded-full font-bold uppercase tracking-wide btn-active shadow-sm">Generator</button>
            </div>
            <div id="checklist-container" class="space-y-2.5"></div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-40 pb-8 pointer-events-none">
        <div class="rounded-[30px] p-4 shadow-xl pointer-events-auto bg-white/80 backdrop-blur-xl border border-white max-w-md mx-auto">
            <div class="flex justify-between items-center gap-3 mb-3 px-1">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="via-octo" class="sr-only peer">
                    <div class="w-9 h-5 bg-[#ccccff] rounded-full peer-checked:bg-[#00b8a9] relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-[14px] after:w-[14px] after:transition-all peer-checked:after:translate-x-[16px]"></div>
                    <span class="ml-2 text-[9px] font-bold text-[#1a2744] uppercase tracking-wide">Octopus</span>
                </label>
                <div class="flex gap-2">
                    <select id="in-cur" class="bg-white border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#1a2744] appearance-none shadow-sm"><option>HKD</option><option>JPY</option><option>CNY</option></select>
                    <select id="in-cat" class="bg-white border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#1a2744] appearance-none shadow-sm">
                        <option value="Meal">Meal (Daily)</option>
                        <option value="Transport">Transport (Daily)</option>
                        <option value="Shopping">Shopping (Daily)</option>
                        <option value="Takarazuka">Takarazuka (Cycle)</option>
                        <option value="TopUp">TopUp (Cycle)</option>
                        <option value="Transfer">Transfer (Cycle)</option>
                        <option value="Income">Income (+)</option>
                        <option value="Exclude">Exclude (None)</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-2 relative z-10">
                <input type="text" id="in-name" placeholder="Detail..." class="glass-input flex-[2] rounded-xl px-4 text-sm h-12 font-medium bg-white/70">
                <input type="number" id="in-val" placeholder="0.00" class="glass-input flex-1 rounded-xl px-3 text-sm font-mono-custom h-12 text-right bg-white/70">
                <button onclick="commitTransaction()" class="bg-gradient-to-r from-[#ccccff] to-[#b3b3e6] text-[#1a2744] rounded-xl px-4 h-12 text-[10px] font-bold uppercase btn-active shadow-sm">Submit</button>
            </div>
        </div>
    </div>

    <div id="checklist-modal" class="modal-overlay"><div class="modal-backdrop" onclick="toggleModal('checklist-modal', false)"></div>
        <div class="modal-content glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-xs font-bold text-[#1a2744] uppercase tracking-widest mb-6 text-center">Expedition Generator</h3>
            <input type="text" id="tour-name" placeholder="Trip Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4 text-center">
            <button onclick="generateTour()" class="w-full py-4 rounded-2xl text-[10px] font-bold text-white bg-[#00b8a9] uppercase btn-active shadow-md">Generate Plan</button>
        </div>
    </div>

    <div id="wish-modal" class="modal-overlay"><div class="modal-backdrop" onclick="toggleModal('wish-modal', false)"></div>
        <div class="modal-content glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-xs font-bold text-[#1a2744] uppercase tracking-widest mb-6 text-center">New Wish</h3>
            <input type="text" id="final-wish-name" placeholder="Item Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4">
            <input type="number" id="final-wish-target" placeholder="HKD Amount" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-6 font-mono-custom">
            <button onclick="addWishFinal()" class="w-full py-4 rounded-2xl text-[10px] font-bold text-white bg-[#ccccff] text-[#1a2744] uppercase btn-active">Confirm</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay"><div class="modal-backdrop" onclick="toggleModal('edit-modal', false)"></div>
        <div class="modal-content glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 id="modal-title" class="text-xs font-bold text-[#1a2744] uppercase tracking-widest mb-6 text-center">Update</h3>
            <input type="number" id="modal-input" class="glass-input rounded-2xl py-4 text-3xl font-mono-custom font-bold text-center mb-6">
            <div class="flex gap-3">
                <button onclick="toggleModal('edit-modal', false)" class="flex-1 py-3.5 rounded-2xl text-[10px] font-bold bg-white border border-[#1a2744]/10">Cancel</button>
                <button onclick="saveEditModal()" class="flex-1 py-3.5 rounded-2xl text-[10px] font-bold text-white bg-[#1a2744]">Save</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ume_matrix_v12_logic';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All', activeEditKey = null;
        let defaultDb = { baseBudget: 0, targetSaving: 0, octopusBal: 0, records: [], dueDates: [], checklist: [], wishlist: [] };
        let db = { ...defaultDb };

        // 核心财务逻辑函数
        function calculateStats() {
            let pool = db.baseBudget;
            let octo = db.octopusBal;
            let dailySpentToday = 0;
            const now = new Date();
            const nowStr = `${now.getMonth()+1}.${now.getDate()}`;
            
            // 定义哪些类别是“每日类”
            const dailyCategories = ['Meal', 'Transport', 'Shopping'];

            db.records.forEach(r => {
                if(r.category === 'Exclude') return;

                if(r.category === 'Income') {
                    pool += r.valHKD;
                } else if(r.category === 'TopUp') {
                    pool -= r.valHKD; // 充值通常从总池子减，加到八达通
                    octo += r.valHKD;
                } else {
                    // 扣除余额逻辑
                    if(r.viaOcto) octo -= r.valHKD; 
                    else pool -= r.valHKD;

                    // 每日推荐预算扣减逻辑：只有当天的“每日类”消费才会直接减少 Daily Rec
                    if(dailyCategories.includes(r.category) && r.fullDate === nowStr) {
                        dailySpentToday += r.valHKD;
                    }
                }
            });

            const daysLeft = getCycleDays();
            // 基础日推荐 = (可用资产 - 目标储蓄) / 剩余天数
            // “非每日类”消费已经通过 pool 的减少自动摊薄在之后每一天了
            const baseDailyRec = Math.max(0, (pool - db.targetSaving) / daysLeft);
            
            // 今天的推荐 = 基础日推荐 - 今天已经花掉的“每日类”开销
            const finalDailyRec = Math.max(0, baseDailyRec - dailySpentToday);

            return { pool, octo, rec: finalDailyRec, daysLeft, baseDailyRec };
        }

        // --- 基础逻辑保持 ---
        function getCycleDays() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            return today === lastDay ? new Date(now.getFullYear(), now.getMonth() + 2, 0).getDate() : (lastDay - today) + 1;
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('stat-octo').innerText = s.octo.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('stat-save').innerText = (db.targetSaving || 0).toLocaleString();
            document.getElementById('stat-daily').innerText = Math.floor(s.rec);
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            // Wishlist Allocation (基于盈余)
            let surplus = 0; const now = new Date();
            for(let d = 1; d <= now.getDate(); d++) {
                const dateKey = `${now.getMonth()+1}.${d}`;
                const dailySpent = db.records.reduce((sum, r) => (r.fullDate === dateKey && ['Meal', 'Transport', 'Shopping'].includes(r.category)) ? sum + r.valHKD : sum, 0);
                surplus += (s.baseDailyRec - dailySpent);
            }
            surplus = Math.max(0, surplus);
            db.wishlist.forEach(w => { const fill = Math.min(w.target, surplus); w.saved = fill; surplus -= fill; });

            // 渲染列表
            renderAudit(s);
            renderWishlist();
            renderDue();
            renderChecklist();
            updateTicker();
        }

        function commitTransaction() {
            const val = parseFloat(document.getElementById('in-val').value); if(isNaN(val) || val <= 0) return;
            const cur = document.getElementById('in-cur').value, cat = document.getElementById('in-cat').value, name = document.getElementById('in-name').value;
            db.records.unshift({ 
                name: name || cat, 
                valHKD: val * (FX[cur] || 1), 
                category: cat, 
                viaOcto: document.getElementById('via-octo').checked, 
                fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` 
            });
            document.getElementById('in-val').value = ''; document.getElementById('in-name').value = ''; saveLocally();
        }

        // --- 辅助 UI 函数 ---
        function renderAudit() {
            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Transfer', 'Income', 'Exclude'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `<button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border border-white text-[9px] font-bold uppercase transition-all snap-start whitespace-nowrap ${currentFilter === c ? 'bg-[#1a2744] text-white shadow-md' : 'bg-white/40 text-[#1a2744]'}">${c}</button>`).join('');
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            document.getElementById('log-list').innerHTML = filtered.slice(0, 15).map(r => `<div class="flex justify-between items-center p-4 border-b border-white/40 last:border-0 ${r.category === 'Exclude' ? 'opacity-40 italic' : ''}"><div class="flex flex-col gap-0.5"><span class="text-xs font-bold text-[#1a2744]">${r.name}</span><div class="text-[9px] text-[#1a2744]/50 uppercase font-medium">${r.fullDate} ${r.viaOcto?'• OCT':''} • ${r.category}</div></div><div class="font-mono-custom font-bold text-sm ${r.category === 'Income' ? 'text-[#00b8a9]' : 'text-[#1a2744]'}">${r.category === 'Income' ? '+' : '-'}${r.valHKD.toFixed(1)}</div></div>`).join('') || `<div class="p-6 text-center text-xs text-[#1a2744]/40 font-bold uppercase">No records</div>`;
        }
        function renderWishlist() {
            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => `<div class="glass-card rounded-[24px] p-4 relative overflow-hidden bg-white/50 group"><div class="flex justify-between mb-2.5 text-[10px] font-bold uppercase z-10 relative"><span>✦ ${w.name}</span><span class="text-[#00b8a9]">${((w.saved/w.target)*100).toFixed(1)}%</span></div><div class="w-full h-2 bg-[#1a2744]/5 rounded-full overflow-hidden z-10 relative shadow-inner"><div class="h-full bg-gradient-to-r from-[#00b8a9] to-[#00d6c4] rounded-full transition-all duration-1000" style="width:${(w.saved/w.target)*100}%"></div></div><button onclick="removeWish(${i})" class="absolute top-2 right-3 text-[16px] text-[#1a2744]/10 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all z-20">×</button></div>`).join('');
        }
        function renderDue() {
            document.getElementById('due-list').innerHTML = db.dueDates.map(d => `<div class="glass-card rounded-[20px] p-4 flex justify-between items-center bg-white/60"><div class="flex flex-col gap-1"><span class="text-xs font-bold text-[#1a2744]">${d.name} (${d.type})</span><div class="flex gap-2 text-[10px] text-[#1a2744]/60 font-mono-custom"><span class="bg-white/80 px-1.5 rounded-md font-bold">$${d.amount}</span><span>${d.date}</span></div></div><button onclick="executeDue(${d.id})" class="bg-[#1a2744] text-white text-[9px] font-bold px-4 py-2.5 rounded-xl uppercase btn-active shadow-sm">Pay</button></div>`).join('') || `<div class="text-center text-[10px] text-[#1a2744]/40 py-2 uppercase font-bold">No due items</div>`;
        }
        function renderChecklist() {
            document.getElementById('checklist-container').innerHTML = db.checklist.map((c, i) => `<div class="glass-card rounded-[20px] p-3.5 flex justify-between items-center ${c.done ? 'opacity-40' : 'bg-white/60'} group"><span class="text-xs font-semibold ${c.done ? 'line-through' : ''}">${c.name}</span><div class="flex items-center gap-3"><input type="checkbox" ${c.done ? 'checked' : ''} onchange="toggleCheck(${i})" class="w-5 h-5 border-2 border-[#1a2744]/20 rounded-md checked:bg-[#00b8a9] appearance-none"><button onclick="removeCheck(${i})" class="text-[16px] text-[#1a2744]/20 hover:text-red-400">×</button></div></div>`).join('');
        }
        function updateTicker() {
            let tickerParts = [];
            db.checklist.filter(c => !c.done).forEach(c => tickerParts.push(`TASK: ${c.name}`));
            db.dueDates.forEach(d => tickerParts.push(`DUE: ${d.name} ($${d.amount})`));
            const tickerHtml = tickerParts.length > 0 ? tickerParts.map(p => `<span class="mx-8">${p}</span>`).join('') : `<span class="mx-8 opacity-40">ALL CLEAR</span>`;
            document.getElementById('main-ticker').innerHTML = tickerHtml.repeat(6); 
        }

        // --- 系统函数 ---
        function exportData() {
            const dataStr = JSON.stringify(db, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = `ume_matrix_v12_${new Date().toISOString().slice(0,10)}.json`;
            link.click(); URL.revokeObjectURL(url);
        }
        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm("Importing will overwrite current data. Continue?")) { db = { ...defaultDb, ...imported }; saveLocally(); location.reload(); }
                } catch (err) { alert("Invalid file."); }
            };
            reader.readAsText(file);
        }
        function initApp() {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) try { db = JSON.parse(localData); } catch (e) {}
            refresh(); updateFX(); 
        }
        function saveLocally() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refresh();
            const status = document.getElementById('sync-status');
            status.style.opacity = '1'; setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) modal.classList.add('active'); else modal.classList.remove('active');
        }
        function addDue() {
            const n = document.getElementById('due-name').value.trim(), a = document.getElementById('due-amt').value; if(!n || !a) return;
            db.dueDates.push({ id: Date.now(), type: document.getElementById('due-type').value, name: n, amount: parseFloat(a), date: document.getElementById('due-date').value || 'TBD' });
            document.getElementById('due-name').value = ''; document.getElementById('due-amt').value = ''; saveLocally();
        }
        function executeDue(id) {
            const idx = db.dueDates.findIndex(d => d.id === id); if(idx > -1) {
                const item = db.dueDates[idx];
                db.records.unshift({ name: `✦ [${item.type}] ${item.name}`, valHKD: item.amount, category: 'Takarazuka', viaOcto: false, fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` });
                db.dueDates.splice(idx, 1); saveLocally();
            }
        }
        function generateTour() {
            const name = document.getElementById('tour-name').value.trim(); if(!name) return;
            db.checklist.push({ name: `✦ ${name} | Ticket`, done: false }, { name: `✦ ${name} | Hotel`, done: false });
            toggleModal('checklist-modal', false); saveLocally();
        }
        function addWishFinal() {
            const n = document.getElementById('final-wish-name').value.trim(), t = parseFloat(document.getElementById('final-wish-target').value);
            if(n && t > 0) { db.wishlist.push({ name: n, target: t, saved: 0 }); toggleModal('wish-modal', false); saveLocally(); }
        }
        function openEditModal(key, title) { activeEditKey = key; document.getElementById('modal-title').innerText = `Update ${title}`; document.getElementById('modal-input').value = db[key]; toggleModal('edit-modal', true); }
        function saveEditModal() { const val = parseFloat(document.getElementById('modal-input').value); if(!isNaN(val)) db[activeEditKey] = val; toggleModal('edit-modal', false); saveLocally(); }
        window.toggleCheck = (i) => { db.checklist[i].done = !db.checklist[i].done; saveLocally(); };
        window.removeCheck = (i) => { if(confirm('Delete?')) { db.checklist.splice(i, 1); saveLocally(); } };
        window.removeWish = (i) => { if(confirm('Remove?')) { db.wishlist.splice(i, 1); saveLocally(); } };
        window.setFilter = (f) => { currentFilter = f; refresh(); };
        async function updateFX() { 
            const btn = document.getElementById('fx-display'); btn.classList.add('animate-pulse');
            try { 
                const res = await fetch('https://open.er-api.com/v6/latest/HKD'); const data = await res.json(); 
                if(data.rates) { FX.JPY = 1/data.rates.JPY; FX.CNY = 1/data.rates.CNY; btn.innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`; refresh(); } 
            } catch(e) { btn.innerText = "FX Offline"; } btn.classList.remove('animate-pulse');
        }
        window.onload = initApp;
    </script>
</body></html>
