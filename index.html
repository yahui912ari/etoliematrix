    <style vid="7">
        /* --- 核心视觉变量定义 --- */
        :root {
            --color-primary: #1a2744;    /* 经典深蓝 */
            --color-accent: #00b8a9;     /* 极光青 */
            --color-soft: #ccccff;       /* 薰衣草紫 */
            --color-bg: #fdfdfe;
            --glass-blur: blur(25px);
            --shadow-sm: 0 4px 12px rgba(26, 39, 68, 0.05);
            --shadow-lg: 0 20px 40px rgba(26, 39, 68, 0.12);
        }

        /* --- 基础与排版 --- */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            background-color: var(--color-bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--color-primary);
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .font-matrix-logo { font-family: 'Playfair Display', serif; font-weight: 600; font-style: italic; }
        .font-code-std { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- 玻璃拟态组件 --- */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 100%);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-sm);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(26, 39, 68, 0.08);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            color: var(--color-primary);
            outline: none;
        }
        .glass-input:focus {
            border-color: var(--color-accent);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 184, 169, 0.08);
            transform: translateY(-1px);
        }

        /* --- 动态交互效果 --- */
        .btn-press:active { transform: scale(0.92); }
        .btn-press { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes sync-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .sync-active { animation: sync-rotate 1.5s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-entrance { animation: fade-in-up 0.6s ease-out forwards; }

        .ticker-container {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-scroll { animation: scroll-left 35s linear infinite; }

        .modal-base {
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-base.active { opacity: 1; pointer-events: auto; }
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
        }
        .modal-window {
            transform: scale(0.85) translateY(40px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-base.active .modal-window { transform: scale(1) translateY(0); }

        .section-spacing { margin-bottom: 3.5rem; }
    </style>
</head>

    <script vid="143">
        /**
         * Matrix Alpha Engine - Enterprise Core
         * NEW BIN ID: 69ccc3c6aaba882197b3625c
         */
        const BIN_ID = '69ccc3c6aaba882197b3625c';
        const STORAGE_KEY = 'matrix_alpha_v25';
        const KEY_STORAGE = 'matrix_vault_key';
        
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.09 };
        let activeFilter = 'All';
        let editorTarget = null;

        let state = {
            baseBudget: 0,
            targetSaving: 0,
            octopusBal: 0,
            records: [],
            dueDates: [],
            expedition: [],
            wishlist: []
        };

        function initSystem() {
            const local = localStorage.getItem(STORAGE_KEY);
            if(local) { try { state = JSON.parse(local); } catch(e) { console.error("Local data invalid"); } }
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if(savedKey) document.getElementById('vault-code').value = savedKey;
            refreshUI();
            updateFX();
        }

        // --- 云端核心逻辑 ---
        async function triggerCloudSync() {
            const key = document.getElementById('vault-code').value;
            const icon = document.getElementById('sync-svg');
            const ind = document.getElementById('sync-indicator');

            if(!key) { alert("Access Key Required."); return; }
            
            icon.classList.add('sync-active');
            ind.innerText = "Querying Cloud...";
            ind.style.opacity = '1';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': key }
                });
                const result = await response.json();

                if(response.ok) {
                    if(confirm("Cloud Record Found. Overwrite Local State?")) {
                        state = result.record;
                        saveAndRefresh();
                        ind.innerText = "Sync Success";
                    } else if(confirm("Push Local state to Cloud instead?")) {
                        await pushState(key);
                    }
                } else {
                    const msg = result.message || "Access Denied";
                    if(msg.includes("Key") || response.status === 401) {
                        alert(`【未授权错误】\n你的 Master Key 可能输入错误了。\n注意：请在 JSONBin 官网 API Keys 页面复制 "Master Key"，而不是登录密码。`);
                    } else if(confirm(`Bin Not Found or Private (${msg}). Create/Push local data?`)) {
                        await pushState(key);
                    }
                }
            } catch(e) {
                alert("Network Fault: Cloud unreachable.");
            } finally {
                icon.classList.remove('sync-active');
                setTimeout(() => ind.style.opacity = '0', 3000);
            }
        }

        async function pushState(key) {
            const ind = document.getElementById('sync-indicator');
            ind.innerText = "Pushing Data...";
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': key },
                    body: JSON.stringify(state)
                });
                if(res.ok) {
                    ind.innerText = "Upload Complete";
                } else {
                    const errData = await res.json();
                    alert(`Upload Failed: ${errData.message}`);
                }
            } catch (err) {
                alert("Critical Push Failure.");
            }
        }

        // --- 业务计算逻辑 ---
        function calculateMetrics() {
            let pool = state.baseBudget, octo = state.octopusBal, dailySum = 0;
            const today = `${new Date().getMonth()+1}.${new Date().getDate()}`;
            state.records.forEach(r => {
                if(r.category === 'Exclude') return;
                if(r.category === 'Income') pool += r.valHKD;
                else if(r.category === 'TopUp') { pool -= r.valHKD; octo += r.valHKD; }
                else {
                    if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD;
                    if(['Meal','Transport','Shopping'].includes(r.category) && r.date === today) dailySum += r.valHKD;
                }
            });
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const left = lastDay - now.getDate() + 1;
            return { pool, octo, rec: Math.max(0, (pool - state.targetSaving) / left), left, dailySum };
        }

        // --- 渲染引擎 ---
        function refreshUI() {
            const m = calculateMetrics();
            document.getElementById('disp-assets').innerText = m.pool.toLocaleString('en-US', {minimumFractionDigits: 1});
            document.getElementById('disp-octo').innerText = m.octo.toLocaleString('en-US', {minimumFractionDigits: 1});
            document.getElementById('disp-save').innerText = state.targetSaving.toLocaleString();
            document.getElementById('disp-daily').innerText = Math.floor(m.rec);
            document.getElementById('disp-days').innerText = `${m.left}D`;

            const ticker = document.getElementById('ticker-flow');
            let msgs = state.expedition.filter(e => !e.done).map(e => `Task: ${e.name}`);
            state.dueDates.forEach(d => msgs.push(`Due: ${d.name} ($${d.amount})`));
            if(msgs.length === 0) msgs = ["Protocol Standard", "Assets Secure", "Flow Monitor Active"];
            ticker.innerHTML = msgs.map(msg => `<span class="mx-16">✦ ${msg}</span>`).join('').repeat(4);

            renderAudit(m);
            renderWishlist();
            renderDue();
            renderExp();
        }

        function renderAudit(m) {
            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'Income', 'TopUp', 'Exclude'];
            document.getElementById('filter-bar').innerHTML = cats.map(c => `
                <button onclick="setFilter('${c}')" class="px-6 py-2.5 rounded-2xl border border-white text-[10px] font-bold uppercase transition-all snap-start whitespace-nowrap ${activeFilter === c ? 'bg-[#1a2744] text-white shadow-xl' : 'bg-white text-[#1a2744] opacity-60'}">
                    ${c}
                </button>
            `).join('');
            const filtered = state.records.filter(r => activeFilter === 'All' || r.category === activeFilter);
            let net = 0;
            document.getElementById('log-list').innerHTML = filtered.slice(0, 40).map(r => {
                if(r.category !== 'Exclude') net += (r.category === 'Income') ? r.valHKD : -r.valHKD;
                return `<div class="flex justify-between items-center px-7 py-5 border-b border-[#1a2744]/5 last:border-0 ${r.category === 'Exclude' ? 'opacity-30' : ''}">
                    <div class="flex flex-col"><span class="text-[12px] font-bold text-[#1a2744]">${r.name}</span><span class="text-[8px] font-bold text-[#1a2744]/30 uppercase">${r.date} • ${r.category}</span></div>
                    <span class="font-code-std font-bold text-sm ${r.category === 'Income' ? 'text-[#00b8a9]' : 'text-[#1a2744]'}">${r.category === 'Income' ? '+' : '-'}${r.valHKD.toFixed(1)}</span></div>`;
            }).join('') || '<div class="py-20 text-center opacity-10 font-bold uppercase">No Records</div>';
            document.getElementById('audit-net').innerText = `NET: ${net.toFixed(1)}`;
        }

        function renderWishlist() {
            document.getElementById('wish-container').innerHTML = state.wishlist.map((w, i) => {
                const progress = Math.min(100, ((state.baseBudget - state.targetSaving) / w.target) * 100);
                return `<div class="glass-card rounded-[32px] p-6 relative group">
                    <div class="flex justify-between items-end mb-4 relative z-10"><div class="flex flex-col"><span class="text-[10px] font-bold text-[#1a2744]/40 uppercase mb-1">Wish Item</span><span class="text-sm font-bold text-[#1a2744]">${w.name}</span></div><span class="text-xs font-code-std font-bold text-[#00b8a9]">${progress.toFixed(1)}%</span></div>
                    <div class="w-full h-1.5 bg-[#1a2744]/5 rounded-full overflow-hidden"><div class="h-full bg-[#00b8a9] transition-all duration-1000" style="width: ${progress}%"></div></div>
                    <button onclick="removeItem('wishlist', ${i})" class="absolute top-4 right-6 opacity-0 group-hover:opacity-100 transition-opacity">×</button></div>`;
            }).join('');
        }

        function renderDue() {
            document.getElementById('due-list').innerHTML = state.dueDates.map((d, i) => `
                <div class="glass-card rounded-[24px] p-5 flex justify-between items-center">
                    <div class="flex flex-col"><div class="flex items-center gap-2 mb-1"><span class="px-2 py-0.5 bg-[#1a2744] text-white text-[7px] font-bold rounded uppercase">${d.type}</span><span class="text-xs font-bold text-[#1a2744]">${d.name}</span></div><span class="text-[9px] font-code-std text-[#1a2744]/40">$${d.amount} • ${d.date}</span></div>
                    <div class="flex gap-2"><button onclick="settleDue(${i})" class="px-4 py-2 bg-[#ccccff] text-[#1a2744] text-[9px] font-bold rounded-xl btn-press">SETTLE</button><button onclick="removeItem('dueDates', ${i})" class="p-2 opacity-20 hover:opacity-100">×</button></div></div>
            `).join('');
        }

        function renderExp() {
            document.getElementById('exp-container').innerHTML = state.expedition.map((e, i) => `
                <div class="glass-card rounded-2xl p-4 flex justify-between items-center ${e.done ? 'opacity-30' : ''}">
                    <div class="flex items-center gap-4"><input type="checkbox" ${e.done ? 'checked' : ''} onchange="toggleExp(${i})" class="w-5 h-5 accent-[#00b8a9]"><span class="text-xs font-semibold ${e.done ? 'line-through' : ''}">${e.name}</span></div>
                    <button onclick="removeItem('expedition', ${i})" class="opacity-10 hover:opacity-100">×</button></div>
            `).join('');
        }

        // --- 交互实现 ---
        function submitFlow() {
            const v = parseFloat(document.getElementById('ipt-val').value), n = document.getElementById('ipt-name').value, c = document.getElementById('sel-cat').value, cur = document.getElementById('sel-cur').value;
            if(!v) return;
            state.records.unshift({ name: n || c, valHKD: v * FX[cur], category: c, viaOcto: document.getElementById('check-octo').checked, date: `${new Date().getMonth()+1}.${new Date().getDate()}` });
            document.getElementById('ipt-val').value = ''; document.getElementById('ipt-name').value = '';
            saveAndRefresh();
        }

        function addDueItem() {
            const n = document.getElementById('due-name').value, a = parseFloat(document.getElementById('due-amt').value);
            if(n && a) { state.dueDates.push({ name: n, amount: a, date: document.getElementById('due-date').value || 'TBD', type: document.getElementById('due-type').value }); saveAndRefresh(); }
        }

        function settleDue(idx) {
            const d = state.dueDates[idx];
            state.records.unshift({ name: `[SETTLED] ${d.name}`, valHKD: d.amount, category: 'Takarazuka', viaOcto: false, date: `${new Date().getMonth()+1}.${new Date().getDate()}` });
            state.dueDates.splice(idx, 1); saveAndRefresh();
        }

        function generateExp() {
            const n = prompt("Mission Name?"); if(!n) return;
            state.expedition.push({ name: `✦ ${n} Ticket`, done: false }, { name: `✦ ${n} Hotel`, done: false });
            saveAndRefresh();
        }

        // --- 系统函数 ---
        window.saveKeyToLocal = v => localStorage.setItem(KEY_STORAGE, v);
        window.saveAndRefresh = () => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); refreshUI(); };
        window.openEditor = (k, t) => { editorTarget = k; document.getElementById('edit-title').innerText = `EDIT ${t}`; document.getElementById('edit-input').value = state[k]; openModal('editor-modal'); };
        window.applyEdit = () => { state[editorTarget] = parseFloat(document.getElementById('edit-input').value) || 0; closeModal('editor-modal'); saveAndRefresh(); };
        window.removeItem = (k, i) => { if(confirm('Delete?')) { state[k].splice(i, 1); saveAndRefresh(); } };
        window.toggleExp = i => { state.expedition[i].done = !state.expedition[i].done; saveAndRefresh(); };
        window.setFilter = f => { activeFilter = f; refreshUI(); };
        window.openModal = id => document.getElementById(id).classList.add('active');
        window.closeModal = id => document.getElementById(id).classList.remove('active');

        async function updateFX() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/HKD');
                const d = await r.json();
                if(d.rates) { FX.JPY = 1/d.rates.JPY; FX.CNY = 1/d.rates.CNY; document.getElementById('fx-display').innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`; refreshUI(); }
            } catch(e) { document.getElementById('fx-display').innerText = "FX OFFLINE"; }
        }

        window.onload = initSystem;
    </script>
</body>
</html>
