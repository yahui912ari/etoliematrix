<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" vid="3">
    <title vid="4">etolie.Matrix | Cloud</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@1,500;1,600&amp;display=swap" rel="stylesheet" vid="6">
    <style vid="7">
        :root {
            --color-text: #1a2744;
            --color-green: #00b8a9;
            --color-lavender: #ccccff;
            --color-bg: #ffffff;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: var(--color-bg);
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
        }
        .font-matrix-title { font-family: 'Playfair Display', serif; font-weight: 600; font-style: italic; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-card { background: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 8px 32px rgba(26, 39, 68, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.2s ease; color: var(--color-text); width: 100%; outline: none; }
        .glass-input:focus { border-color: var(--color-green); background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 0 2px rgba(0, 184, 169, 0.2); }
        .btn-active:active { transform: scale(0.96); }
        .btn-active { transition: transform 0.1s ease, background-color 0.2s ease; }
        .ticker-mask { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-ticker { animation: ticker 60s linear infinite; }
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-backdrop { position: absolute; inset: 0; background: rgba(26, 39, 68, 0.2); backdrop-filter: blur(4px); }
        .modal-content { transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    </style>
</head>
<body class="w-full flex flex-col relative pb-40">

    <div id="login-screen">
        <h1 class="font-matrix-title text-[#1a2744] mb-8">
            <span class="text-lg lowercase font-normal opacity-70">etolie</span><span class="text-4xl">.Matrix</span>
        </h1>
        <div class="w-full max-w-xs space-y-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">输入你的专属 Code</p>
            <input type="text" id="user-bin-code" placeholder="Enter Custom Code..." class="glass-input rounded-2xl px-4 py-3.5 text-sm text-center font-mono-custom border border-gray-100">
            <button onclick="handleCloudLogin()" class="w-full py-4 rounded-2xl text-[10px] font-bold text-white bg-[#1a2744] uppercase tracking-widest btn-active">进入矩阵</button>
            <p id="login-error" class="text-red-500 text-[10px] text-center font-bold uppercase mt-2"></p>
        </div>
    </div>

    <header class="pt-12 pb-4 px-6 relative z-10">
        <div class="flex justify-between items-start mb-6">
            <div><h1 class="text-4xl font-matrix-title text-[#1a2744] leading-none mb-1">Matrix<span class="text-[#00b8a9]">.</span></h1></div>
            <div class="flex flex-col items-end gap-1">
                <button id="fx-display" class="px-3 py-1.5 rounded-full glass-panel text-[10px] font-mono-custom font-semibold text-[#1a2744] btn-active shadow-sm" onclick="updateFX()">Syncing FX...</button>
                <div class="flex gap-2 items-center">
                    <span id="sync-status" class="text-[8px] font-bold text-[#00b8a9] uppercase tracking-widest opacity-0 transition-opacity duration-300">Synced</span>
                    <button onclick="logout()" class="text-[8px] font-bold text-gray-300 uppercase tracking-widest hover:text-[#1a2744]">Logout</button>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[32px] p-6 mb-5 relative overflow-hidden">
            <div class="flex gap-4 mb-6 relative z-10">
                <div class="flex-1 flex flex-col cursor-pointer border-r border-[#1a2744]/10 pr-2" onclick="openEditModal('baseBudget', 'Total Assets')">
                    <span class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Total (HKD)</span>
                    <div class="text-2xl font-mono-custom font-bold text-[#1a2744]" id="stat-assets">0.00</div>
                </div>
                <div class="flex-1 flex flex-col cursor-pointer pl-2" onclick="openEditModal('octopusBal', 'Octopus Initial')">
                    <span class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Octopus</span>
                    <div class="text-2xl font-mono-custom font-bold text-[#ccccff]" id="stat-octo">0.00</div>
                </div>
            </div>
            <div class="flex items-center justify-between border-t border-white/60 pt-4 text-center gap-2 relative z-10">
                <div class="flex-1 cursor-pointer" onclick="openEditModal('targetSaving', 'Target Saving')">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Target</div>
                    <div class="text-base font-mono-custom font-bold text-[#00b8a9]" id="stat-save">0</div>
                </div>
                <div class="w-px h-6 bg-[#1a2744]/10 rounded-full"></div>
                <div class="flex-1">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Daily Rec</div>
                    <div class="text-base font-mono-custom font-bold text-[#ccccff]" id="stat-daily">0</div>
                </div>
                <div class="w-px h-6 bg-[#1a2744]/10 rounded-full"></div>
                <div class="flex-1">
                    <div class="text-[9px] text-[#1a2744]/60 uppercase font-bold tracking-wider mb-1">Cycle Left</div>
                    <div class="text-base font-mono-custom font-bold text-[#1a2744]" id="stat-days">0D</div>
                </div>
            </div>
        </div>

        <div class="w-full h-10 rounded-full shadow-sm bg-white/60 backdrop-blur-xl border border-white flex items-center overflow-hidden relative">
            <div class="absolute left-1 z-10 bg-white shadow-sm px-3 py-1.5 rounded-full text-[8px] font-bold text-[#1a2744]">TICKER</div>
            <div class="ticker-mask w-full h-full flex items-center ml-24">
                <div id="main-ticker" class="flex whitespace-nowrap animate-ticker text-[10px] font-mono-custom font-bold text-[#1a2744]/80 uppercase"></div>
            </div>
        </div>
    </header>

    <main class="px-6 pt-2 space-y-10 relative z-0">
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase">✦ Audit Stream</h2>
                <div id="audit-summary" class="px-3 py-1 bg-white/60 rounded-full font-mono-custom font-bold text-[9px]">NET: 0</div>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-2" id="audit-filters"></div>
            <div class="glass-card rounded-[24px] overflow-hidden flex flex-col min-h-[100px]" id="log-list"></div>
        </section>

        <section>
            <h2 class="text-xs font-bold text-[#1a2744] tracking-widest uppercase mb-4">✦ Wishlist</h2>
            <div id="wish-container" class="space-y-3"></div>
            <button onclick="toggleModal('wish-modal', true)" class="w-full mt-4 py-3.5 rounded-2xl border border-dashed border-[#1a2744]/30 text-[10px] font-bold text-[#1a2744]/60 uppercase btn-active">New Wish</button>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-40 pb-8 pointer-events-none">
        <div class="rounded-[30px] p-4 shadow-xl pointer-events-auto bg-white/80 backdrop-blur-xl border border-white max-w-md mx-auto">
            <div class="flex justify-between mb-3 px-1">
                <label class="inline-flex items-center cursor-pointer"><input type="checkbox" id="via-octo" class="sr-only peer"><div class="w-9 h-5 bg-[#ccccff] rounded-full peer-checked:bg-[#00b8a9] relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-[14px] after:w-[14px] after:transition-all peer-checked:after:translate-x-[16px]"></div><span class="ml-2 text-[9px] font-bold text-[#1a2744] uppercase">Octopus</span></label>
                <div class="flex gap-2">
                    <select id="in-cur" class="bg-white border rounded-lg px-2 py-1.5 text-[10px] font-bold"><option>HKD</option><option>JPY</option><option>CNY</option></select>
                    <select id="in-cat" class="bg-white border rounded-lg px-2 py-1.5 text-[10px] font-bold"><option value="Meal">Meal</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option><option value="Takarazuka">Takarazuka</option><option value="TopUp">TopUp</option><option value="Income">Income</option></select>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="in-name" placeholder="Detail..." class="glass-input flex-[2_1_120px] rounded-xl px-4 text-sm h-12 font-medium">
                <input type="number" id="in-val" placeholder="0.00" class="glass-input flex-[1_1_70px] rounded-xl px-3 text-sm font-mono-custom h-12 text-right">
                <button onclick="commitTransaction()" class="bg-[#1a2744] text-white rounded-xl px-4 h-12 text-[10px] font-bold uppercase btn-active">Submit</button>
            </div>
        </div>
    </div>

    <div id="wish-modal" class="modal-overlay"><div class="modal-backdrop" onclick="toggleModal('wish-modal', false)"></div><div class="modal-content glass-card rounded-[32px] p-8 w-full max-w-sm"><h3 class="text-xs font-bold text-[#1a2744] uppercase mb-6 text-center">New Wish</h3><input type="text" id="final-wish-name" placeholder="Item Name" class="glass-input rounded-2xl px-4 py-3.5 mb-4"><input type="number" id="final-wish-target" placeholder="Amount" class="glass-input rounded-2xl px-4 py-3.5 mb-6"><button onclick="addWishFinal()" class="w-full py-4 rounded-2xl text-[10px] font-bold text-white bg-[#ccccff] text-[#1a2744] uppercase btn-active">Confirm</button></div></div>
    <div id="edit-modal" class="modal-overlay"><div class="modal-backdrop" onclick="toggleModal('edit-modal', false)"></div><div class="modal-content glass-card rounded-[32px] p-8 w-full max-w-sm text-center"><h3 id="modal-title" class="text-xs font-bold text-[#1a2744] uppercase mb-6">Update</h3><input type="number" id="modal-input" class="glass-input rounded-2xl py-4 text-3xl font-mono-custom font-bold text-center mb-6"><div class="flex gap-3"><button onclick="toggleModal('edit-modal', false)" class="flex-1 py-3.5 rounded-2xl text-[10px] font-bold bg-white border uppercase btn-active">Cancel</button><button onclick="saveEditModal()" class="flex-1 py-3.5 rounded-2xl text-[10px] font-bold text-white bg-[#1a2744] uppercase btn-active">Save</button></div></div></div>

    <script vid="logic">
        // --- 云端核心配置 ---
        const JB_KEY = '$2a$10$ocLkwYyNKzVQOu61XN.JmeA4AQ5C9nOnJje4AirkvnbDjlqxIGm.m'; 
        const MAPPING_BIN_ID = '69ccbe0936566621a86ab1ce'; 
        
        let activeBinId = localStorage.getItem('jb_bin_id') || '';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All', activeEditKey = null;
        let db = { baseBudget: 0, targetSaving: 0, octopusBal: 0, records: [], dueDates: [], checklist: [], wishlist: [] };

        async function handleCloudLogin() {
            const customCode = document.getElementById('user-bin-code').value.trim();
            if (!customCode) return;
            const errorEl = document.getElementById('login-error');
            errorEl.innerText = "正在连接矩阵...";

            try {
                const mapRes = await fetch(`https://api.jsonbin.io/v3/b/${MAPPING_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JB_KEY }
                });
                const mapData = await mapRes.json();
                const realBinId = mapData.record[customCode];

                if (realBinId) {
                    activeBinId = realBinId;
                    await fetchAndLoadData(realBinId);
                } else {
                    if (confirm(`Code "${customCode}" 尚未使用，是否创建新矩阵？`)) {
                        await createNewBinWithCustomCode(customCode, mapData.record);
                    } else { errorEl.innerText = "已取消"; }
                }
            } catch (e) { errorEl.innerText = "同步失败"; }
        }

        async function fetchAndLoadData(binId) {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Master-Key': JB_KEY }
                });
                const data = await res.json();
                db = data.record;
                localStorage.setItem('jb_bin_id', binId);
                document.getElementById('login-screen').style.display = 'none';
                refresh(); updateFX();
            } catch (e) { alert("数据加载失败"); }
        }

        async function createNewBinWithCustomCode(customCode, currentMap) {
            try {
                const res = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JB_KEY, 'X-Bin-Private': 'true' },
                    body: JSON.stringify(db)
                });
                const data = await res.json();
                const newRealId = data.metadata.id;
                currentMap[customCode] = newRealId;
                await fetch(`https://api.jsonbin.io/v3/b/${MAPPING_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JB_KEY },
                    body: JSON.stringify(currentMap)
                });
                activeBinId = newRealId;
                localStorage.setItem('jb_bin_id', newRealId);
                document.getElementById('login-screen').style.display = 'none';
                refresh();
            } catch (e) { alert("创建失败"); }
        }

        function logout() { localStorage.removeItem('jb_bin_id'); location.reload(); }

        function saveLocally() {
            if (!activeBinId) return;
            fetch(`https://api.jsonbin.io/v3/b/${activeBinId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JB_KEY },
                body: JSON.stringify(db)
            }).then(() => {
                const s = document.getElementById('sync-status');
                s.style.opacity = '1'; setTimeout(() => s.style.opacity = '0', 2000);
            });
            refresh();
        }

        function calculateStats() {
            let pool = db.baseBudget, octo = db.octopusBal;
            db.records.forEach(r => {
                if(r.category === 'Income') pool += r.valHKD;
                else if(r.category === 'TopUp') { pool -= r.valHKD; octo += r.valHKD; }
                else { if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD; }
            });
            const daysLeft = getCycleDays();
            const rec = Math.max(0, ((pool - db.targetSaving) / daysLeft) * 0.8);
            return { pool, octo, rec, daysLeft, baseDailyRec: rec };
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('stat-octo').innerText = s.octo.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('stat-save').innerText = db.targetSaving.toLocaleString();
            document.getElementById('stat-daily').innerText = Math.floor(s.rec);
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            let totalSurplus = 0;
            const now = new Date();
            for(let d = 1; d <= now.getDate(); d++) {
                const dKey = `${now.getMonth()+1}.${d}`;
                const spent = db.records.reduce((sum, r) => (r.fullDate===dKey && ['Meal','Transport','Shopping'].includes(r.category)) ? sum+r.valHKD : sum, 0);
                totalSurplus += (s.baseDailyRec - spent);
            }
            let pPool = Math.max(0, totalSurplus);
            db.wishlist.forEach(w => { w.saved = Math.min(w.target, pPool); pPool -= w.saved; });
            renderUI();
        }

        function renderUI() {
            let parts = [];
            db.wishlist.forEach(w => parts.push(`WISH: ${w.name} (${Math.floor(w.saved/w.target*100)}%)`));
            document.getElementById('main-ticker').innerHTML = (parts.length ? parts : ["Matrix Active"]).map(p => `<span class="mx-8">${p}</span>`).join('').repeat(6);
            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Income'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `<button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border text-[9px] font-bold uppercase transition-all ${currentFilter === c ? 'bg-[#1a2744] text-white' : 'bg-white/40 text-[#1a2744]'}">${c}</button>`).join('');
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            document.getElementById('log-list').innerHTML = filtered.slice(0,20).map(r => `<div class="flex justify-between items-center p-4 border-b border-white/40"><div class="flex flex-col"><span class="text-xs font-bold">${r.name}</span><span class="text-[9px] opacity-40">${r.fullDate}</span></div><div class="font-mono-custom font-bold text-sm ${r.category==='Income'?'text-[#00b8a9]':'text-[#1a2744]'}">${r.valHKD.toFixed(1)}</div></div>`).join('');
            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => {
                const perc = Math.min(100, (w.saved / w.target) * 100);
                return `<div class="glass-card rounded-[24px] p-4 relative group"><div class="flex justify-between mb-2 text-[10px] font-bold"><span>${w.name}</span><span>${perc.toFixed(0)}%</span></div><div class="w-full h-1 bg-gray-100 rounded-full"><div class="h-full bg-[#00b8a9]" style="width:${perc}%"></div></div><button onclick="removeWish(${i})" class="absolute top-1 right-2 opacity-0 group-hover:opacity-100">×</button></div>`;
            }).join('');
        }

        function commitTransaction() {
            const val = parseFloat(document.getElementById('in-val').value);
            if(!val) return;
            db.records.unshift({ 
                name: document.getElementById('in-name').value || document.getElementById('in-cat').value,
                valHKD: val * (FX[document.getElementById('in-cur').value] || 1),
                category: document.getElementById('in-cat').value,
                viaOcto: document.getElementById('via-octo').checked,
                fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}`
            });
            document.getElementById('in-val').value = ''; saveLocally();
        }

        function addWishFinal() {
            const n = document.getElementById('final-wish-name').value;
            const t = parseFloat(document.getElementById('final-wish-target').value);
            if(n && t) { db.wishlist.push({name:n, target:t, saved:0}); toggleModal('wish-modal', false); saveLocally(); }
        }

        function getCycleDays() {
            const now = new Date(), last = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            return (now.getDate() === last) ? new Date(now.getFullYear(), now.getMonth() + 2, 0).getDate() : (last - now.getDate()) + 1;
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }
        function openEditModal(key, title) { activeEditKey = key; document.getElementById('modal-title').innerText = title; document.getElementById('modal-input').value = db[key]; toggleModal('edit-modal', true); }
        function saveEditModal() { db[activeEditKey] = parseFloat(document.getElementById('modal-input').value); toggleModal('edit-modal', false); saveLocally(); }
        window.removeWish = (i) => { db.wishlist.splice(i,1); saveLocally(); };
        window.setFilter = (f) => { currentFilter = f; refresh(); };

        async function updateFX() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                if(data.rates) { FX.JPY = 1 / data.rates.JPY; FX.CNY = 1 / data.rates.CNY; document.getElementById('fx-display').innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`; refresh(); }
            } catch(e) { document.getElementById('fx-display').innerText = "FX Offline"; }
        }

        window.onload = () => { if(activeBinId) { fetchAndLoadData(activeBinId); } };
    </script>
</body></html>
