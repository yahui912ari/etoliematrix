        :root {

        }
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: var(--color-bg);
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            overflow-x: hidden;
            width: 100%;

        }

            font-style: italic;
        }
        .font-mono-custom {
            font-family: 'JetBrains Mono', monospace;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px rgba(26, 39, 68, 0.05);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.2s ease;
            color: var(--color-text);
            width: 100%;
            outline: none;
        }
        .glass-input:focus {
            border-color: var(--color-green);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 2px rgba(0, 184, 169, 0.2);
        }
        .glass-input::placeholder {
            color: rgba(26, 39, 68, 0.4);
        }

        .btn-active:active {
            transform: scale(0.96);
        }
        .btn-active {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .ticker-mask {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-ticker {
            animation: ticker 60s linear infinite;
        }

        .modal-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(26, 39, 68, 0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-content {
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
    </style>
</head>

    <script vid="143">
        const STORAGE_KEY = 'ume_matrix_v11_local_demo';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All';
        let activeEditKey = null;

        // 已清除预填数据
        let defaultDb = {
            baseBudget: 0,
            targetSaving: 0,
            octopusBal: 0,
            records: [],
            dueDates: [],
            checklist: [],
            wishlist: []
        };

        let db = { ...defaultDb };

        function initApp() {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) {
                try {
                    db = JSON.parse(localData);
                } catch (e) {
                    console.error("Error parsing local data, using defaults.");
                }
            }
            refresh();
            updateFX(); 
        }

        function saveLocally() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refresh();
            const status = document.getElementById('sync-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

        function getCycleDays() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            if (today === lastDay) {
                return new Date(now.getFullYear(), now.getMonth() + 2, 0).getDate();
            }
            return (lastDay - today) + 1;
        }

        function calculateStats() {
            let pool = db.baseBudget;
            let octo = db.octopusBal;
            let dailySpentToday = 0;
            const nowStr = `${new Date().getMonth()+1}.${new Date().getDate()}`;

            db.records.forEach(r => {
                if(r.category === 'Exclude') return;
                if(r.category === 'Income') {
                    pool += r.valHKD;
                } else if(r.category === 'TopUp') {
                    pool -= r.valHKD; 
                    octo += r.valHKD;
                } else {
                    if(r.viaOcto) octo -= r.valHKD; 
                    else pool -= r.valHKD;
                    if(['Meal', 'Transport', 'Shopping'].includes(r.category) && r.fullDate === nowStr) {
                        dailySpentToday += r.valHKD;
                    }
                }
            });

            const daysLeft = getCycleDays();
            const rec = Math.max(0, (pool - db.targetSaving) / daysLeft);
            return { pool, octo, rec, daysLeft, dailySpentToday };
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('stat-octo').innerText = s.octo.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('stat-save').innerText = db.targetSaving.toLocaleString();
            document.getElementById('stat-daily').innerText = Math.floor(s.rec);
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            const now = new Date();
            const todayIdx = now.getDate();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const theoreticalTotalLimit = ((db.baseBudget - db.targetSaving) / daysInMonth) * todayIdx;
            const totalDailyTypeSpent = db.records.reduce((sum, r) => {
                return (['Meal', 'Transport', 'Shopping'].includes(r.category)) ? sum + r.valHKD : sum;
            }, 0);

            let surplus = Math.max(0, theoreticalTotalLimit - totalDailyTypeSpent);
            db.wishlist.forEach(w => {
                const fill = Math.min(w.target, surplus);
                w.saved = fill;
                surplus -= fill;
            });

            let tickerParts = [];
            db.checklist.filter(c => !c.done).forEach(c => tickerParts.push(`TASK: ${c.name}`));
            db.dueDates.forEach(d => tickerParts.push(`DUE: ${d.name} ($${d.amount})`));
            const tickerHtml = tickerParts.length > 0 
                ? tickerParts.map(p => `<span class="mx-8">${p}</span>`).join('') 
                : `<span class="mx-8 opacity-40">ALL CLEAR • NO PENDING TASKS</span>`;
            document.getElementById('main-ticker').innerHTML = tickerHtml.repeat(6); 

            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Transfer', 'Income', 'Exclude'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `
                <button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border border-white text-[9px] font-bold uppercase transition-all duration-200 snap-start whitespace-nowrap ${currentFilter === c ? 'bg-[#1a2744] text-white shadow-md' : 'bg-white/40 text-[#1a2744] hover:bg-white/60'}">
                    ${c}
                </button>
            `).join('');
            
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            let netTotal = 0;
            const listHtml = filtered.slice(0, 15).map(r => {
                if(r.category !== 'Exclude') {
                    netTotal += (r.category === 'Income' || (r.category === 'TopUp' && !r.viaOcto)) ? r.valHKD : -r.valHKD;
                }
                const isIncome = r.category === 'Income';
                const isExclude = r.category === 'Exclude';
                const amtColor = isIncome ? 'text-[#00b8a9]' : 'text-[#1a2744]';
                const sign = isIncome ? '+' : '-';
                return `
                <div class="flex justify-between items-center p-4 border-b border-white/40 last:border-0 ${isExclude ? 'opacity-40 italic' : ''} hover:bg-white/20 transition-colors">
                    <div class="flex flex-col gap-0.5">
                        <span class="text-xs font-bold text-[#1a2744]">${r.name}</span>
                        <div class="flex items-center gap-1.5 text-[9px] text-[#1a2744]/50 uppercase font-medium">
                            <span>${r.fullDate}</span>
                            ${r.viaOcto ? '<span class="bg-[#ccccff]/50 px-1 rounded text-[#1a2744]">OCT</span>' : ''}
                            <span>• ${r.category}</span>
                        </div>
                    </div>
                    <div class="font-mono-custom font-bold text-sm tracking-tight ${amtColor}">
                        ${sign}${r.valHKD.toFixed(1)}
                    </div>
                </div>`;
            }).join('');
            document.getElementById('log-list').innerHTML = listHtml || `<div class="p-6 text-center text-xs text-[#1a2744]/40 font-bold uppercase">No records found</div>`;
            document.getElementById('audit-summary').innerText = `NET: ${netTotal > 0 ? '+' : ''}${netTotal.toFixed(0)}`;

            document.getElementById('checklist-container').innerHTML = db.checklist.map((c, i) => `
                <div class="glass-card rounded-[20px] p-3.5 flex justify-between items-center transition-all duration-300 ${c.done ? 'opacity-40 bg-white/20' : 'bg-white/60'} group">
                    <span class="text-xs font-semibold ${c.done ? 'line-through text-[#1a2744]/60' : 'text-[#1a2744]'}">${c.name}</span>
                    <div class="flex items-center gap-3">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" ${c.done ? 'checked' : ''} onchange="toggleCheck(${i})" class="w-5 h-5 appearance-none border-2 border-[#1a2744]/20 rounded-md checked:bg-[#00b8a9] checked:border-[#00b8a9] transition-colors cursor-pointer relative z-10">
                            ${c.done ? '<svg class="w-3 h-3 absolute text-white pointer-events-none z-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <button onclick="removeCheck(${i})" class="text-[16px] text-[#1a2744]/20 hover:text-red-400 transition-colors px-1 leading-none">×</button>
                    </div>
                </div>
            `).join('') || `<div class="text-center text-[10px] text-[#1a2744]/40 py-2 uppercase font-bold">Checklist empty</div>`;

            document.getElementById('due-list').innerHTML = db.dueDates.map(d => `
                <div class="glass-card rounded-[20px] p-4 flex justify-between items-center bg-white/60 hover:bg-white/80 transition-colors">
                    <div class="flex flex-col gap-1">
                        <span class="text-xs font-bold text-[#1a2744]">${d.name} <span class="text-[10px] text-[#1a2744]/50 font-normal ml-1">(${d.type})</span></span>
                        <div class="flex gap-2 text-[10px] text-[#1a2744]/60 font-mono-custom">
                            <span class="bg-white/80 px-1.5 rounded-md text-[#1a2744] font-bold">$${d.amount}</span>
                            <span>Due: ${d.date}</span>
                        </div>
                        ${d.memo ? `<span class="text-[9px] text-[#1a2744]/40 italic mt-0.5">${d.memo}</span>` : ''}
                    </div>
                    <button onclick="executeDue(${d.id})" class="bg-gradient-to-r from-[#1a2744] to-[#25375f] text-white text-[9px] font-bold px-4 py-2.5 rounded-xl uppercase tracking-wider btn-active shadow-sm">
                        Pay
                    </button>
                </div>
            `).join('') || `<div class="text-center text-[10px] text-[#1a2744]/40 py-2 uppercase font-bold">No due items</div>`;

            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => {
                const perc = Math.min(100, (w.saved / w.target) * 100);
                return `
                <div class="glass-card rounded-[24px] p-4 relative overflow-hidden bg-white/50 group">
                    <div class="flex justify-between mb-2.5 text-[10px] font-bold uppercase tracking-wide z-10 relative">
                        <span class="text-[#1a2744] flex items-center gap-1.5">
                            <span class="text-[#ccccff] text-[12px]">✦</span> ${w.name}
                        </span>
                        <span class="font-mono-custom text-[#00b8a9]">${perc.toFixed(1)}%</span>
                    </div>
                    <div class="w-full h-2 bg-[#1a2744]/5 rounded-full overflow-hidden z-10 relative shadow-inner">
                        <div class="h-full bg-gradient-to-r from-[#00b8a9] to-[#00d6c4] rounded-full transition-all duration-1000 ease-out" style="width:${perc}%"></div>
                    </div>
                    <div class="mt-2 flex justify-between text-[8px] font-mono-custom text-[#1a2744]/40 z-10 relative">
                        <span>$${Math.floor(w.saved)}</span>
                        <span>$${w.target}</span>
                    </div>
                    <button onclick="removeWish(${i})" class="absolute top-2 right-3 text-[16px] text-[#1a2744]/10 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all z-20 leading-none">×</button>
                </div>`;
            }).join('');
        }

        function commitTransaction() {
            const valInput = document.getElementById('in-val').value;
            const val = parseFloat(valInput);
            if(isNaN(val) || val <= 0) return;
            const cur = document.getElementById('in-cur').value;
            const cat = document.getElementById('in-cat').value;
            const nameInput = document.getElementById('in-name').value;
            const finalVal = val * (FX[cur] || 1);
            db.records.unshift({ 
                name: nameInput || cat, 
                valHKD: finalVal, 
                category: cat, 
                viaOcto: document.getElementById('via-octo').checked, 
                fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` 
            });
            document.getElementById('in-val').value = ''; 
            document.getElementById('in-name').value = ''; 
            saveLocally();
        }

        function addDue() {
            const n = document.getElementById('due-name').value.trim();
            const a = document.getElementById('due-amt').value;
            if(!n || !a) {
                alert("Please provide a name and amount.");
                return;
            }
            db.dueDates.push({ 
                id: Date.now(), 
                type: document.getElementById('due-type').value, 
                name: n, 
                amount: parseFloat(a), 
                date: document.getElementById('due-date').value || 'TBD', 
                memo: document.getElementById('due-memo').value 
            });
            document.getElementById('due-name').value = ''; 
            document.getElementById('due-amt').value = ''; 
            document.getElementById('due-memo').value = '';
            document.getElementById('due-date').value = '';
            saveLocally();
        }

        function executeDue(id) {
            const idx = db.dueDates.findIndex(d => d.id === id);
            if(idx > -1) {
                const item = db.dueDates[idx];
                if(confirm(`Execute payment for ${item.name} ($${item.amount})?`)) {
                    db.records.unshift({ 
                        name: `✦ [${item.type}] ${item.name}`, 
                        valHKD: item.amount, 
                        category: 'Takarazuka', 
                        viaOcto: false, 
                        fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` 
                    });
                    db.dueDates.splice(idx, 1); 
                    saveLocally();
                }
            }
        }

        function generateTour() {
            const name = document.getElementById('tour-name').value.trim();
            const count = parseInt(document.getElementById('tour-count').value) || 1;
            const hasEvent = document.getElementById('tour-has-event').checked;
            
            if(!name) {
                alert("Please enter a trip name.");
                return;
            }
            
            db.checklist.push({ name: `✦ ${name} | Ticket`, done: false });
            if(hasEvent) {
                db.checklist.push({ name: `✦ ${name} | Event`, done: false });
            }
            for(let i = 1; i <= count; i++) {
                const suffix = count > 1 ? ` #${i}` : '';
                db.checklist.push({ name: `✦ ${name} | Flight${suffix}`, done: false });
                db.checklist.push({ name: `✦ ${name} | Hotel${suffix}`, done: false });
            }
            
            document.getElementById('tour-name').value = '';
            document.getElementById('tour-count').value = '1';
            toggleModal('checklist-modal', false); 
            saveLocally();
        }

        function addWishFinal() {
            const n = document.getElementById('final-wish-name').value.trim();
            const t = parseFloat(document.getElementById('final-wish-target').value);
            if(n && !isNaN(t) && t > 0) { 
                db.wishlist.push({ name: n, target: t, saved: 0 }); 
                document.getElementById('final-wish-name').value = '';
                document.getElementById('final-wish-target').value = '';
                toggleModal('wish-modal', false); 
                saveLocally(); 
            }
        }

        function openEditModal(key, title) { 
            activeEditKey = key; 
            document.getElementById('modal-title').innerText = `Update ${title}`; 
            document.getElementById('modal-input').value = db[key]; 
            toggleModal('edit-modal', true); 
            setTimeout(() => document.getElementById('modal-input').focus(), 100);
        }

        function saveEditModal() { 
            const val = parseFloat(document.getElementById('modal-input').value);
            if(!isNaN(val)) {
                db[activeEditKey] = val; 
            }
            toggleModal('edit-modal', false); 
            saveLocally(); 
        }

        window.toggleCheck = (i) => { 
            db.checklist[i].done = !db.checklist[i].done; 
            saveLocally(); 
        };
        
        window.removeCheck = (i) => { 
            if(confirm('Delete this checklist item?')) { 
                db.checklist.splice(i, 1); 
                saveLocally(); 
            } 
        };
        
        window.removeWish = (i) => { 
            if(confirm('Remove this wish?')) { 
                db.wishlist.splice(i, 1); 
                saveLocally(); 
            } 
        };
        
        window.setFilter = (f) => { 
            currentFilter = f; 
            refresh(); 
        };

        async function updateFX() { 
            const displayBtn = document.getElementById('fx-display');
            displayBtn.classList.add('animate-pulse');
            try { 
                const res = await fetch('https://open.er-api.com/v6/latest/HKD'); 
                const data = await res.json(); 
                if(data.rates) { 
                    FX.JPY = 1 / data.rates.JPY; 
                    FX.CNY = 1 / data.rates.CNY; 
                    displayBtn.innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`; 
                    refresh(); 
                } 
            } catch(e) { 
                displayBtn.innerText = "FX Offline (Defaults)"; 
            } finally {
                displayBtn.classList.remove('animate-pulse');
            }
        }

        window.onload = initApp;
    </script>
</body></html>
