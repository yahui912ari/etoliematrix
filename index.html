<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ume Matrix | Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
    
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fbf8; font-family: 'Inter', sans-serif; color: #474a4d; overflow-x: hidden; width: 100%; height: auto; }
        .font-matrix-title { font-family: 'Playfair Display', serif; font-weight: 600; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-card { background: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 8px 32px rgba(71, 74, 77, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.2s ease; color: #474a4d; width: 100%; }
        .glass-input:focus { outline: none; border-color: #a8c97f; background: rgba(255, 255, 255, 0.8); }
        .responsive-flex { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-active:active { transform: scale(0.96); }
        .ticker-container { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-ticker { animation: ticker 60s linear infinite; }
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; display: flex; }
    </style>
</head>

<body class="relative">
    <div class="w-full flex flex-col">
        <header class="pt-12 pb-4 px-6 relative">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-4xl font-matrix-title text-[#474a4d] leading-none mb-1">Matrix<span class="text-[#a8c97f]">.</span></h1>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <button id="fx-display" class="px-3 py-1.5 rounded-full glass-panel text-[10px] font-mono font-semibold text-[#474a4d] btn-active" onclick="updateFX()">Syncing FX...</button>
                    <span id="sync-status" class="text-[8px] font-bold text-[#a8c97f] uppercase tracking-widest opacity-0 transition-opacity">Cloud Synced</span>
                </div>
            </div>

            <div class="glass-card rounded-[32px] p-6 mb-4">
                <div class="flex gap-4 mb-5">
                    <div class="flex-1 flex flex-col cursor-pointer border-r border-[#474a4d]/5" onclick="openEditModal('baseBudget', 'Total Assets')">
                        <span class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1">Total (HKD)</span>
                        <div class="text-2xl font-mono font-bold text-[#474a4d] tracking-tight break-all" id="stat-assets">0.00</div>
                    </div>
                    <div class="flex-1 flex flex-col cursor-pointer pl-2" onclick="openEditModal('octopusBal', 'Octopus Initial')">
                        <span class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1">Octopus</span>
                        <div class="text-2xl font-mono font-bold text-[#e6cde3] tracking-tight break-all" id="stat-octo">0.00</div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between border-t border-white/60 pt-4 text-center gap-1">
                    <div class="flex-1 cursor-pointer" onclick="openEditModal('targetSaving', 'Target Saving')">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1">Target</div>
                        <div class="text-base font-mono font-bold text-[#a8c97f]" id="stat-save">0</div>
                    </div>
                    <div class="w-px h-6 bg-[#474a4d]/10"></div>
                    <div class="flex-1">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1">Daily Rec</div>
                        <div class="text-base font-mono font-bold text-[#e6cde3]" id="stat-daily">0</div>
                    </div>
                    <div class="w-px h-6 bg-[#474a4d]/10"></div>
                    <div class="flex-1">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1">Cycle Left</div>
                        <div class="text-base font-mono font-bold text-[#474a4d]" id="stat-days">0D</div>
                    </div>
                </div>
            </div>

            <div class="w-full h-10 rounded-full shadow-lg bg-white/80 backdrop-blur-xl border border-white flex items-center overflow-hidden relative">
                <div class="absolute left-1 z-10 bg-white shadow-sm px-3 py-1 rounded-full text-[8px] font-bold tracking-widest text-[#474a4d] flex items-center gap-1.5">
                    <div class="w-1 h-1 rounded-full bg-[#a8c97f] animate-pulse"></div>TICKER
                </div>
                <div class="ticker-container w-full h-full flex items-center ml-20">
                    <div id="main-ticker" class="flex whitespace-nowrap animate-ticker text-[10px] font-mono font-bold text-[#474a4d]/80 uppercase"></div>
                </div>
            </div>
        </header>

        <main class="px-6 pt-4 pb-64 space-y-10">
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase">✦ Audit Stream</h2>
                    <div id="audit-summary" class="px-3 py-1 bg-white/60 backdrop-blur-sm rounded-full font-mono font-bold text-[9px] text-[#474a4d] border border-white">NET: 0</div>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-1" id="audit-filters"></div>
                <div class="glass-card rounded-[24px] overflow-hidden" id="log-list"></div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase">✦ Expedition Checklist</h2>
                    <button onclick="toggleModal('checklist-modal', true)" class="text-[10px] bg-white/60 text-[#474a4d] border border-white px-3 py-1.5 rounded-full font-bold btn-active shadow-sm">Generator</button>
                </div>
                <div id="checklist-container" class="space-y-2"></div>
            </section>

            <section>
                <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase mb-4">✦ Due Planning</h2>
                <div class="glass-card rounded-[24px] p-5 mb-4 space-y-3">
                    <div class="responsive-flex">
                        <select id="due-type" class="glass-input h-11 rounded-xl px-3 text-xs font-bold uppercase flex-[1_1_80px]">
                            <option>Ticket</option><option>Hotel</option><option>Flight</option><option>Event</option><option>Goods</option>
                        </select>
                        <input type="text" id="due-name" placeholder="Name" class="glass-input flex-[2_1_150px] rounded-xl px-4 text-sm h-11">
                    </div>
                    <div class="responsive-flex">
                        <input type="text" id="due-memo" placeholder="Memo" class="glass-input flex-1 rounded-xl px-4 text-sm h-11">
                        <input type="text" id="due-date" placeholder="MM.DD" class="glass-input w-24 rounded-xl text-center text-sm font-mono h-11">
                    </div>
                    <div class="responsive-flex">
                        <input type="number" id="due-amt" placeholder="HKD Amount" class="glass-input flex-1 rounded-xl px-4 h-11 text-sm font-mono">
                        <button onclick="addDue()" class="bg-[#474a4d] text-white rounded-xl px-6 h-11 text-[10px] font-bold uppercase btn-active shadow-md">Plan</button>
                    </div>
                </div>
                <div id="due-list" class="space-y-2"></div>
            </section>

            <section class="pb-10">
                <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase mb-4">✦ Wishlist</h2>
                <div id="wish-container" class="space-y-3"></div>
                <button onclick="toggleModal('wish-modal', true)" class="w-full mt-3 py-3 rounded-2xl border border-dashed border-[#474a4d]/30 text-[10px] font-bold text-[#474a4d]/60 uppercase btn-active">New Wish</button>
            </section>
        </main>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-40 pb-10 pointer-events-none">
        <div class="rounded-[30px] p-4 shadow-2xl pointer-events-auto bg-white/90 backdrop-blur-xl border border-white max-w-md mx-auto">
            <div class="flex flex-wrap justify-between items-center gap-3 mb-3 px-1">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="via-octo" class="sr-only peer">
                    <div class="w-8 h-4 bg-[#e6cde3] rounded-full peer-checked:bg-[#a8c97f] transition-colors border border-white"></div>
                    <span class="ml-2 text-[9px] font-bold text-[#474a4d] uppercase">Octopus</span>
                </label>
                <div class="flex gap-2">
                    <select id="in-cur" class="bg-white/60 border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#474a4d]"><option>HKD</option><option>JPY</option><option>CNY</option></select>
                    <select id="in-cat" class="bg-white/60 border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#474a4d]">
                        <option value="Meal">Meal</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option>
                        <option value="Takarazuka">Takarazuka</option><option value="TopUp">TopUp</option><option value="Transfer">Transfer</option>
                        <option value="Income">Income</option><option value="Exclude">Exclude</option>
                    </select>
                </div>
            </div>
            <div class="responsive-flex">
                <input type="text" id="in-name" placeholder="Detail" class="glass-input flex-[2_1_120px] rounded-xl px-4 text-sm h-12">
                <input type="number" id="in-val" placeholder="0.00" class="glass-input flex-[1_1_70px] rounded-xl px-3 text-sm font-mono h-12 text-right">
                <button onclick="commitTransaction()" class="bg-[#e6cde3] text-[#474a4d] rounded-xl px-4 h-12 text-[10px] font-bold uppercase btn-active shadow-sm border border-white">Submit</button>
            </div>
        </div>
    </div>

    <div id="checklist-modal" class="modal-overlay">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('checklist-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-sm font-bold text-[#474a4d] uppercase mb-6 text-center">Expedition Generator</h3>
            <input type="text" id="tour-name" placeholder="Tour Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4">
            <div class="space-y-4 mb-6 px-1">
                <div class="flex justify-between items-center text-xs font-bold text-[#474a4d] uppercase">
                    <span>Hotel/Flight Count</span>
                    <input type="number" id="tour-count" value="1" class="glass-input w-20 rounded-xl py-2 text-center font-mono">
                </div>
                <div class="flex justify-between items-center text-xs font-bold text-[#474a4d] uppercase">
                    <span>Include Event?</span>
                    <input type="checkbox" id="tour-event" class="w-5 h-5 accent-[#a8c97f]">
                </div>
            </div>
            <button onclick="generateTour()" class="w-full py-4 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Generate</button>
        </div>
    </div>

    <div id="wish-modal" class="modal-overlay">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('wish-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-sm font-bold text-[#474a4d] uppercase mb-6 text-center">New Wish</h3>
            <input type="text" id="final-wish-name" placeholder="Item Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4">
            <input type="number" id="final-wish-target" placeholder="Price (HKD)" class="glass-input rounded-2xl px-4 py-3.5 text-sm font-mono mb-6">
            <button onclick="addWishFinal()" class="w-full py-4 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Confirm Add</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('edit-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 text-center shadow-2xl">
            <h3 id="modal-title" class="text-xs font-bold uppercase mb-6 text-[#474a4d]">Update</h3>
            <input type="number" id="modal-input" class="glass-input rounded-2xl py-4 text-2xl font-mono font-bold text-center mb-6">
            <div class="flex gap-3">
                <button onclick="toggleModal('edit-modal', false)" class="flex-1 py-3 rounded-2xl text-xs font-bold text-[#474a4d] bg-white/60 border border-white btn-active">Cancel</button>
                <button onclick="saveEditModal()" class="flex-1 py-3 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Save</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_CONF = { masterKey: '$2a$10$Yxf3kPbtKxa8np3kNU2h3eI0kNfWiCRJ1Kiv2TNeyw2PumD7e.TY6', binId: '69cbc9d4856a682189e7120f' };
        const STORAGE_KEY = 'ume_matrix_v11_cloud';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All', activeEditKey = null;
        let db = { records: [], dueDates: [], checklist: [], wishlist: [], baseBudget: 25000, targetSaving: 5000, octopusBal: 1000 };

        async function loadFromCloud() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONF.binId}/latest`, { headers: { 'X-Master-Key': CLOUD_CONF.masterKey } });
                const data = await res.json();
                if (data.record && data.record.records) { db = data.record; localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
            } catch (e) { const local = localStorage.getItem(STORAGE_KEY); if (local) db = JSON.parse(local); }
            refresh();
        }

        async function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refresh();
            const status = document.getElementById('sync-status');
            status.style.opacity = '1';
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONF.binId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_CONF.masterKey }, body: JSON.stringify(db)
                });
                setTimeout(() => { status.style.opacity = '0'; }, 2000);
            } catch (e) { status.innerText = "Sync Error"; status.style.color = "red"; }
        }

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if (show) el.classList.add('active'); else el.classList.remove('active');
        }

        async function updateFX() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                if(data.rates) {
                    FX.JPY = 1 / data.rates.JPY; FX.CNY = 1 / data.rates.CNY;
                    document.getElementById('fx-display').innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`;
                    refresh();
                }
            } catch(e) { document.getElementById('fx-display').innerText = "Offline FX"; }
        }

        function getCycleDays() {
            const now = new Date();
            const year = now.getFullYear(), month = now.getMonth();
            const lastDayThisMonth = new Date(year, month + 1, 0);
            const daysLeft = Math.ceil((lastDayThisMonth - now) / 86400000);
            // 逻辑更新：如果是本月最后一天（daysLeft=0或很小），视为新周期的起始日（下个月的总天数）
            if (daysLeft <= 0) return new Date(year, month + 2, 0).getDate();
            return daysLeft;
        }

        function calculateStats() {
            let pool = db.baseBudget, octo = db.octopusBal;
            db.records.forEach(r => {
                if(r.category === 'Exclude') return;
                if(r.category === 'Income') pool += r.valHKD;
                else if(r.category === 'TopUp') { pool -= r.valHKD; octo += r.valHKD; }
                else if(r.category === 'Transfer') { pool -= r.valHKD; }
                else { if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD; }
            });
            const daysLeft = getCycleDays();
            // 只有 Pool 里的钱（扣除目标储蓄后）平摊给剩余日子
            const rec = Math.max(0, (pool - db.targetSaving) / daysLeft);
            return { pool, octo, rec, daysLeft };
        }

        function commitTransaction() {
            const val = parseFloat(document.getElementById('in-val').value);
            if(isNaN(val) || val <= 0) return;
            const cur = document.getElementById('in-cur').value, cat = document.getElementById('in-cat').value;
            db.records.unshift({ 
                name: document.getElementById('in-name').value || cat, 
                valHKD: val * FX[cur], category: cat, 
                viaOcto: document.getElementById('via-octo').checked, 
                fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` 
            });
            document.getElementById('in-val').value = ''; document.getElementById('in-name').value = '';
            save();
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('stat-octo').innerText = s.octo.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('stat-save').innerText = db.targetSaving.toLocaleString();
            document.getElementById('stat-daily').innerText = s.rec.toFixed(0);
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            // --- 盈余分配逻辑 ---
            const now = new Date();
            const today = now.getDate();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            // 理论每日配额 = (初始总资产 - 目标储蓄) / 本月总天数
            // 间接影响逻辑：由于 Takarazuka/Transfer 减少了 pool，s.rec 已经变小了。
            // 这里我们计算本月累计的“流量消费”盈余
            const dailyQuota = (db.baseBudget - db.targetSaving) / daysInMonth;
            const theoreticalLimit = dailyQuota * today;
            const actualDirectSpend = db.records.reduce((sum, r) => {
                // 只有这三类直接消耗每日限额
                const isDirect = ['Meal', 'Transport', 'Shopping'].includes(r.category);
                return isDirect ? sum + r.valHKD : sum;
            }, 0);
            let surplus = Math.max(0, theoreticalLimit - actualDirectSpend);
            db.wishlist.forEach(w => { const fill = Math.min(w.target, surplus); w.saved = fill; surplus -= fill; });

            // 渲染 Ticker
            let tickerParts = [];
            db.checklist.filter(c => !c.done).forEach(c => tickerParts.push(`TASK: ${c.name}`));
            db.dueDates.forEach(d => tickerParts.push(`DUE: ${d.name} (${d.amount})`));
            document.getElementById('main-ticker').innerHTML = (tickerParts.length ? tickerParts.map(p => `<span class="mx-10">${p}</span>`).join('') : `<span class="mx-10 opacity-40">ALL CLEAR</span>`).repeat(5);

            // 渲染 Filters
            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Transfer', 'Income', 'Exclude'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `<button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border border-white text-[9px] font-bold uppercase transition-all ${currentFilter === c ? 'bg-[#474a4d] text-white' : 'bg-white/40 text-[#474a4d]'}">${c}</button>`).join('');
            
            // 渲染 Log
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            document.getElementById('log-list').innerHTML = filtered.slice(0, 15).map(r => `
                <div class="flex justify-between items-center p-4 border-b border-white/40 last:border-0 ${r.category==='Exclude'?'opacity-50 italic':''}">
                    <div class="text-xs font-bold text-[#474a4d]">${r.name}<div class="text-[9px] text-[#474a4d]/50 uppercase">${r.fullDate} ${r.viaOcto?'[OCT]':''}</div></div>
                    <div class="font-mono font-bold text-sm">${r.valHKD.toFixed(1)}</div>
                </div>`).join('');
            
            // 渲染 Checklist (四角星代替打勾)
            document.getElementById('checklist-container').innerHTML = db.checklist.map((c, i) => `
                <div class="glass-card rounded-2xl p-3 flex justify-between items-center ${c.done?'opacity-40':''}">
                    <span class="text-xs font-semibold ${c.done?'line-through':''}">✦ ${c.name}</span>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleCheck(${i})" class="w-6 h-6 flex items-center justify-center rounded-lg border border-white/60 text-xs">${c.done ? '✦' : ''}</button>
                        <button onclick="removeCheck(${i})" class="text-[14px] text-[#474a4d]/30 px-1">×</button>
                    </div>
                </div>`).join('');

            // 渲染 Due List
            document.getElementById('due-list').innerHTML = db.dueDates.map(d => `
                <div class="glass-card rounded-2xl p-4 flex justify-between items-center">
                    <div class="text-xs font-bold text-[#474a4d]">✦ ${d.name}<div class="text-[9px] opacity-50">${d.date} • ${d.type}</div></div>
                    <button onclick="executeDue(${d.id})" class="bg-[#474a4d] text-white text-[9px] font-bold px-3 py-2 rounded-lg uppercase btn-active">Pay</button>
                </div>`).join('');

            // 渲染 Wishlist
            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => {
                const perc = Math.min(100, (w.saved/w.target)*100);
                return `<div class="glass-card rounded-2xl p-4 relative overflow-hidden">
                    <div class="flex justify-between mb-2 text-[10px] font-bold uppercase z-10 relative">
                        <span class="flex items-center gap-1">${perc >= 100 ? '✦' : '✧'} ${w.name}</span>
                        <span>${perc.toFixed(1)}%</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/60 rounded-full overflow-hidden z-10 relative"><div class="h-full bg-[#a8c97f] transition-all duration-700" style="width:${perc}%"></div></div>
                    <div class="flex justify-between mt-2 text-[8px] font-mono opacity-50"><span>SAVED: ${Math.floor(w.saved)}</span><span>TARGET: ${w.target}</span></div>
                    <button onclick="removeWish(${i})" class="absolute top-1 right-2 text-[14px] text-[#474a4d]/20">×</button>
                </div>`;
            }).join('');
        }

        window.toggleCheck = (i) => { db.checklist[i].done = !db.checklist[i].done; save(); };
        window.removeCheck = (i) => { if(confirm('Delete?')) { db.checklist.splice(i, 1); save(); } };
